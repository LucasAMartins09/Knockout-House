<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Knockout House - Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Krona+One&family=Khula:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_cadastro.css">
</head>
<body>

    <!-- header -->
    <header>
        <img src="12704.png" alt="Logo Knockout House">
        <div class="menu">
            <a href="index.html">HOME</a>
            <a href="quem_somos.html">ABOUT US</a>
            <a href="produtos.html">PRODUCTS</a>
            <a href="busca.html">SEARCH</a>
            <a href="contato.html">CONTACT</a>
            <a href="cadastro.html">REGISTER</a>
            <a href="carrinho.html">ORDERS</a>
        </div>
    </header>

    <!-- Conteudo principal -->
    <main>

        <!-- Titulo da pagina -->
        <section class="titulo-pagina">
            <h1>Criar Conta</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </section>


        <!-- Formulario de cadastro -->
        <section class="formulario">
            <form class="form-cadastro">

                <div class="campo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo">
                </div>

                <div class="campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Digite seu email">
                </div>

                <div class="campo">
                    <label for="usuario">Nome de Usuário</label>
                    <input type="text" id="usuario" placeholder="Escolha um nome de usuário">
                </div>

                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000">
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha">
                </div>

                <div class="campo">
                    <label for="confirmar-senha">Confirmar Senha</label>
                    <input type="password" id="confirmar-senha" placeholder="Repita a senha">
                </div>

                <button type="submit" class="botao-vermelho">Criar Conta</button>

            </form>
        </section>

    </main>

    <!-- footer -->
    <footer>
        <p>Knockout House</p>
        <p>2026 — Todos os direitos reservados</p>
    </footer>

</body>
</html>
